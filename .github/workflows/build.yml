name: build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.23']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install system codec dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libopus-dev \
            libopusfile-dev \
            pkg-config \
            cmake \
            build-essential

      - name: Build and embed bcg729 static library
        run: |
          git clone --depth=1 https://github.com/BelledonneCommunications/bcg729.git /tmp/bcg729
          cd /tmp/bcg729
          cmake . -DENABLE_SHARED=OFF -DENABLE_STATIC=ON
          make -j$(nproc)
          mkdir -p $GITHUB_WORKSPACE/core/codec/bcg729/lib
          cp src/libbcg729.a $GITHUB_WORKSPACE/core/codec/bcg729/lib/

      - name: Install xk6 tool
        run: CGO_ENABLED=1 go install go.k6.io/xk6/cmd/xk6@latest

      - name: Check formatting
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "The following files are not gofmt-clean:"
            gofmt -s -l .
            exit 1
          fi

      - name: Verify dependencies
        run: go mod verify

      - name: Run Unit Tests
        run: CGO_ENABLED=1 go test -v -race ./...

      - name: Build default k6 binary (no G729)
        run: CGO_ENABLED=1 xk6 build --with xk6-sip-media=.

      - name: Build k6 binary with G729 (GPL opt-in)
        env:
          CGO_ENABLED: "1"
          GOFLAGS: "-tags=g729"
        run: xk6 build --with xk6-sip-media=.
